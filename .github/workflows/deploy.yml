name: Deploy RAG Chatbot to VPS

on:
  push:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: chatbot-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: SSH deploy chatbot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_VPS }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          timeout: 60s
          command_timeout: 30m
          script_stop: true
          request_pty: true
          script: |
            set -euo pipefail

            LOCK="/tmp/deploy-chatbot.lock"
            exec 9>"$LOCK"
            flock -n 9 || { echo "Another chatbot deploy is running"; exit 1; }

            APP_DIR="/var/www/chatbot"
            COMPOSE_PROJECT="chatbot"
            APP_SERVICE="ctdt-ai"
            DB_SERVICE="ctdt-db"

            echo "==> whoami"
            whoami
            id

            echo "==> cd app dir"
            cd "$APP_DIR"

            echo "==> verify required files before deploy"
            test -f docker-compose.yml || { echo "Missing docker-compose.yml"; exit 1; }
            test -f .env || { echo "Missing .env on VPS. Refuse to deploy without production env."; exit 1; }

            echo "==> ensure .env is not tracked by git"
            if git ls-files --error-unmatch .env >/dev/null 2>&1; then
              echo ".env is tracked by git. Refuse to deploy."
              exit 1
            fi

            echo "==> git update"
            git config --global --add safe.directory "$APP_DIR"
            git fetch --all --prune
            git reset --hard origin/main

            echo "==> verify required files after git reset"
            test -f docker-compose.yml || { echo "Missing docker-compose.yml after git reset"; exit 1; }
            test -f .env || { echo "Missing .env after git reset"; exit 1; }

            echo "==> verify docker compose"
            docker-compose -p "$COMPOSE_PROJECT" config >/dev/null

            echo "==> ensure database service is up"
            docker-compose -p "$COMPOSE_PROJECT" up -d "$DB_SERVICE"

            echo "==> build app image"
            docker-compose -p "$COMPOSE_PROJECT" build "$APP_SERVICE"

            echo "==> start/recreate app only"
            docker-compose -p "$COMPOSE_PROJECT" up -d --no-deps --force-recreate "$APP_SERVICE"

            echo "==> wait app health"
            for i in $(seq 1 30); do
              if curl -fsS http://127.0.0.1:8100/health/live >/dev/null; then
                echo "App is alive"
                break
              fi

              if [ "$i" -eq 30 ]; then
                echo "App did not become alive"
                docker-compose -p "$COMPOSE_PROJECT" ps
                docker-compose -p "$COMPOSE_PROJECT" logs --tail=120 "$APP_SERVICE"
                exit 1
              fi

              sleep 2
            done

            echo "==> run migrations"
            docker-compose -p "$COMPOSE_PROJECT" exec -T "$APP_SERVICE" alembic upgrade head

            echo "==> check ready"
            curl -fsS http://127.0.0.1:8100/health/ready

            echo "==> check nginx proxy"
            curl -fsS -H "Host: rag.liodev.io.vn" http://127.0.0.1/health/ready

            echo "==> show containers"
            docker-compose -p "$COMPOSE_PROJECT" ps

            echo "✅ Deploy chatbot OK"