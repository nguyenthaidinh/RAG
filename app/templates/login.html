<!DOCTYPE html>
<html lang="{{ lang | default('vi') }}">
<head>
  <meta charset="UTF-8" />
  <title>{{ t('login') }} | AI Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="{{ static_url('css/auth.css') }}" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Brand Icon -->
      <div class="login-brand">
        <div class="login-brand-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4.5a2.5 2.5 0 0 0-4.96-.46 2.5 2.5 0 0 0-1.98 3 2.5 2.5 0 0 0-1.32 4.24 3 3 0 0 0 .34 5.58 2.5 2.5 0 0 0 2.96 3.08A2.5 2.5 0 0 0 12 19.5a2.5 2.5 0 0 0 4.96.44 2.5 2.5 0 0 0 2.96-3.08 3 3 0 0 0 .34-5.58 2.5 2.5 0 0 0-1.32-4.24 2.5 2.5 0 0 0-1.98-3A2.5 2.5 0 0 0 12 4.5"/><path d="m15.7 10.4-.9.4"/><path d="m9.2 13.2-.9.4"/><path d="m13.6 15.7-.4-.9"/><path d="m10.8 9.2-.4-.9"/><path d="m15.7 13.5-.9-.4"/><path d="m9.2 10.9-.9-.4"/><path d="m10.5 15.7.4-.9"/><path d="m13.1 9.2.4-.9"/></svg>
        </div>
      </div>

      <h1 class="title">AI Server</h1>
      <p class="subtitle">{{ t('login_title') }}</p>

      {% if error %}
      <div class="alert error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="post" action="/login" autocomplete="on">
        <div class="form-group">
          <label for="email">{{ t('email') }}</label>
          <input
            id="email"
            type="email"
            name="email"
            placeholder="admin@ai.server"
            required
            autofocus
          />
        </div>

        <div class="form-group">
          <label for="password">{{ t('password') }}</label>

          <div class="input-with-action">
            <input
              id="password"
              type="password"
              name="password"
              placeholder="••••••••"
              required
            />
            <span
              class="input-action"
              id="toggleBtn"
              onclick="togglePassword()"
            >
              {{ t('show') }}
            </span>
          </div>
        </div>

        <div class="form-row">
          <label class="check">
            <input type="checkbox" name="remember" />
            {{ t('remember_me') }}
          </label>
        </div>

        <button type="submit" class="btn-login" id="loginBtn">
          {{ t('login_button') }}
        </button>
      </form>

      <!-- Language toggle — OUTSIDE the login form to avoid nested <form> -->
      <div class="footer" style="display: flex; align-items: center; justify-content: center; gap: 12px;">
        <span>AI Server · Secure Access</span>
        <span style="opacity:.3;">|</span>
        <div style="display: flex; gap: 4px;">
          <form method="post" action="/set-language" style="display:inline;">
            <button type="submit" name="language" value="vi"
              class="lang-flag {% if lang == 'vi' %}lang-flag-active{% endif %}"
              title="Tiếng Việt">🇻🇳</button>
          </form>
          <form method="post" action="/set-language" style="display:inline;">
            <button type="submit" name="language" value="en"
              class="lang-flag {% if lang == 'en' %}lang-flag-active{% endif %}"
              title="English">🇬🇧</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script>
    var showText = "{{ t('show') }}";
    var hideText = "{{ t('hide') }}";

    function togglePassword() {
      var input = document.getElementById("password");
      var btn = document.getElementById("toggleBtn");

      if (input.type === "password") {
        input.type = "text";
        btn.textContent = hideText;
      } else {
        input.type = "password";
        btn.textContent = showText;
      }
    }

    var loginForm = document.querySelector("form[action='/login']");
    var loginBtn = document.getElementById("loginBtn");

    if (loginForm && loginBtn) {
      loginForm.addEventListener("submit", function() {
        loginBtn.classList.add("is-loading");
        loginBtn.disabled = true;
      });
    }
  </script>

</body>
</html>
