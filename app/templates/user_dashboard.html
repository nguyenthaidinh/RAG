<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | AI Server</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="{{ static_url('css/dashboard.css') }}" />
  <style>
    .user-dash-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg, #0f1117);
      padding: 24px;
    }
    .user-dash-card {
      background: var(--card-bg, #1a1d28);
      border: 1px solid var(--border, #2a2d3a);
      border-radius: 12px;
      padding: 40px 48px;
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .user-dash-card h1 {
      margin: 0 0 8px;
      font-size: 22px;
      color: var(--text, #e4e6eb);
    }
    .user-dash-card .subtitle {
      color: var(--muted2, #8b8fa3);
      font-size: 14px;
      margin-bottom: 28px;
    }
    .user-info-table {
      width: 100%;
      text-align: left;
      margin-bottom: 28px;
      border-collapse: collapse;
    }
    .user-info-table td {
      padding: 10px 12px;
      font-size: 14px;
      border-bottom: 1px solid var(--border, #2a2d3a);
    }
    .user-info-table td:first-child {
      color: var(--muted2, #8b8fa3);
      width: 120px;
      font-weight: 500;
    }
    .user-info-table td:last-child {
      color: var(--text, #e4e6eb);
    }
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .badge-role {
      background: rgba(99, 102, 241, .15);
      color: #818cf8;
    }
    .badge-active {
      background: rgba(34, 197, 94, .15);
      color: #4ade80;
    }
    .badge-inactive {
      background: rgba(239, 68, 68, .15);
      color: #f87171;
    }
    .btn-logout {
      display: inline-block;
      padding: 10px 32px;
      background: var(--danger, #ef4444);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      transition: opacity .15s;
    }
    .btn-logout:hover { opacity: .85; }
  </style>
</head>
<body>

  <div class="user-dash-wrapper">
    <div class="user-dash-card">

      <h1>Welcome</h1>
      <p class="subtitle">{{ user.email }}</p>

      <table class="user-info-table">
        <tr>
          <td>Role</td>
          <td><span class="badge badge-role">{{ user.role }}</span></td>
        </tr>
        <tr>
          <td>Tenant</td>
          <td>{{ user.tenant_id }}</td>
        </tr>
        <tr>
          <td>Status</td>
          <td>
            {% if user.is_active %}
              <span class="badge badge-active">Active</span>
            {% else %}
              <span class="badge badge-inactive">Inactive</span>
            {% endif %}
          </td>
        </tr>
      </table>

      <a href="/logout" class="btn-logout">Logout</a>

    </div>
  </div>

</body>
</html>
