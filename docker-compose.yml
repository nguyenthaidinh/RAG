version: '3.8'

services:
  ctdt-ai:
    build: .
    ports:
      - "8100:8000"
    env_file: .env
    depends_on:
      ctdt-db:
        condition: service_healthy
    restart: unless-stopped

  ctdt-db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ragpass}
      POSTGRES_DB: ragai
    volumes:
      - ctdt_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  ctdt_pgdata:
